<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Mbuguah Designs</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .dash-container {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .card h2 {
            color: #38bdf8;
        }

        .admin-header {
            text-align: center;
            padding: 30px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">Mbuguah Dashboard</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<div class="dash-container">

    <div class="admin-header">
        <h1>Business Dashboard</h1>
        <p>Manage your design business</p>
    </div>

    <div class="cards">

        <div class="card">
            <h2>₱ Orders</h2>
            <p>0 Active Orders</p>
        </div>

        <div class="card">
            <h2>💰 Revenue</h2>
            <p>Ksh 0 (manual tracking)</p>
        </div>

        <div class="card">
            <h2>🎨 Projects</h2>
            <p>3 Portfolio Items</p>
        </div>

        <div class="card">
            <h2>📩 Clients</h2>
            <p>WhatsApp + Email</p>
        </div>

    </div>

</div>

</body>
</html>
